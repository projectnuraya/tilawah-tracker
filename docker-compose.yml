services:
  app:
    container_name: tilawah-tracker-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      # If using internal db service, use: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # If using external/existing Postgres, set DATABASE_URL directly in .env
      DATABASE_URL: ${DATABASE_URL}
    # Uncomment 'depends_on' if using the internal db service
    # depends_on:
    #   - db
    
    # Enable this if connecting to other containers in a shared network (e.g., 'proxy_net')
    # networks:
    #   - proxy_net

  # Optional: Internal DB for standalone deployment (dev/staging)
  # Comment this out if using an existing external Postgres instance
  # db:
  #   image: postgres:16-alpine
  #   container_name: tilawah-tracker-db
  #   restart: always
  #   env_file:
  #     - .env
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - proxy_net

# networks:
#   proxy_net:
#     external: true

# volumes:
#   postgres_data:
