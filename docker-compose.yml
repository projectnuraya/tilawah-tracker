services:
  app:
    container_name: tilawah-tracker-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3002:3000"
    # Load all variables from .env directly
    env_file:
      - .env
    # Override specific variables that need dynamic construction or Docker-specific values
    environment:
      # Construct DB URL to point to the 'db' service (internal docker network)
      # This overrides any DATABASE_URL present in the .env file (which might point to localhost)
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: tilawah-tracker-db
    restart: always
    # Load user/password/db name from .env to initialize the database
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
